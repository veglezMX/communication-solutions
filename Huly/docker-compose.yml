services:
  nginx:
    image: nginx:1.21.3
    container_name: huly-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_BIND:-0.0.0.0}:${HTTP_PORT:-8087}:80"
    volumes:
      - ./.huly.nginx:/etc/nginx/conf.d/default.conf
    networks:
      - huly

  cockroach:
    image: cockroachdb/cockroach:latest-v24.2
    container_name: huly-cockroach
    restart: unless-stopped
    command: start-single-node --accept-sql-without-tls
    environment:
      COCKROACH_DATABASE: ${CR_DATABASE}
      COCKROACH_USER: ${CR_USERNAME}
      COCKROACH_PASSWORD: ${CR_USER_PASSWORD}
    volumes:
      - ./volumes/cockroach/data:/cockroach/cockroach-data
      - ./volumes/cockroach/certs:/cockroach/certs
    networks:
      - huly

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.6
    container_name: huly-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
      - --smp
      - "1"
      - --default-log-level=info
    environment:
      REDPANDA_SUPERUSER_USERNAME: ${REDPANDA_ADMIN_USER}
      REDPANDA_SUPERUSER_PASSWORD: ${REDPANDA_ADMIN_PWD}
    volumes:
      - ./volumes/redpanda:/var/lib/redpanda/data
    healthcheck:
      test:
        - CMD
        - rpk
        - cluster
        - info
        - -X
        - user=${REDPANDA_ADMIN_USER}
        - -X
        - pass=${REDPANDA_ADMIN_PWD}
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - huly

  minio:
    image: minio/minio
    container_name: huly-minio
    restart: unless-stopped
    command: server /data --address ":9000" --console-address ":9001"
    volumes:
      - ./volumes/minio:/data
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 5s
      retries: 10
    networks:
      - huly

  elastic:
    image: elasticsearch:7.14.2
    container_name: huly-elastic
    restart: unless-stopped
    command: >
      /bin/sh -c "./bin/elasticsearch-plugin list | grep -q ingest-attachment ||
      yes | ./bin/elasticsearch-plugin install --silent ingest-attachment;
      /usr/local/bin/docker-entrypoint.sh eswrapper"
    environment:
      ELASTICSEARCH_PORT_NUMBER: "9200"
      BITNAMI_DEBUG: "true"
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms1024m -Xmx1024m
      http.cors.enabled: "true"
      http.cors.allow-origin: http://localhost:8082
    volumes:
      - ./volumes/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 20s
      retries: 10
    networks:
      - huly

  rekoni:
    image: hardcoreeng/rekoni-service:${HULY_VERSION}
    container_name: huly-rekoni
    restart: unless-stopped
    environment:
      SECRET: ${SECRET}
    deploy:
      resources:
        limits:
          memory: 500M
    networks:
      - huly

  transactor:
    image: hardcoreeng/transactor:${HULY_VERSION}
    container_name: huly-transactor
    restart: unless-stopped
    environment:
      SERVER_PORT: "3333"
      SERVER_SECRET: ${SECRET}
      DB_URL: ${CR_DB_URL}
      STORAGE_CONFIG: minio|minio?accessKey=minioadmin&secretKey=minioadmin
      FRONT_URL: http://localhost:8087
      ACCOUNTS_URL: http://account:3000
      FULLTEXT_URL: http://fulltext:4700
      STATS_URL: http://stats:4900
      LAST_NAME_FIRST: ${LAST_NAME_FIRST:-true}
      QUEUE_CONFIG: redpanda:9092
    networks:
      - huly

  collaborator:
    image: hardcoreeng/collaborator:${HULY_VERSION}
    container_name: huly-collaborator
    restart: unless-stopped
    environment:
      COLLABORATOR_PORT: "3078"
      SECRET: ${SECRET}
      ACCOUNTS_URL: http://account:3000
      STATS_URL: http://stats:4900
      STORAGE_CONFIG: minio|minio?accessKey=minioadmin&secretKey=minioadmin
    networks:
      - huly

  account:
    image: hardcoreeng/account:${HULY_VERSION}
    container_name: huly-account
    restart: unless-stopped
    environment:
      SERVER_PORT: "3000"
      SERVER_SECRET: ${SECRET}
      DB_URL: ${CR_DB_URL}
      TRANSACTOR_URL: ws://transactor:3333;ws${SECURE:+s}://${HOST_ADDRESS}/_transactor
      STORAGE_CONFIG: minio|minio?accessKey=minioadmin&secretKey=minioadmin
      FRONT_URL: http${SECURE:+s}://${HOST_ADDRESS}
      STATS_URL: http${SECURE:+s}://${HOST_ADDRESS}/_stats
      MODEL_ENABLED: "*"
      ACCOUNTS_URL: http${SECURE:+s}://${HOST_ADDRESS}/_accounts
      ACCOUNT_PORT: "3000"
      QUEUE_CONFIG: redpanda:9092
    networks:
      - huly

  workspace:
    image: hardcoreeng/workspace:${HULY_VERSION}
    container_name: huly-workspace
    restart: unless-stopped
    environment:
      SERVER_SECRET: ${SECRET}
      DB_URL: ${CR_DB_URL}
      TRANSACTOR_URL: ws://transactor:3333;ws${SECURE:+s}://${HOST_ADDRESS}/_transactor
      STORAGE_CONFIG: minio|minio?accessKey=minioadmin&secretKey=minioadmin
      MODEL_ENABLED: "*"
      ACCOUNTS_URL: http://account:3000
      STATS_URL: http://stats:4900
      QUEUE_CONFIG: redpanda:9092
      ACCOUNTS_DB_URL: ${CR_DB_URL}
    networks:
      - huly

  front:
    image: hardcoreeng/front:${HULY_VERSION}
    container_name: huly-front
    restart: unless-stopped
    environment:
      SERVER_PORT: "8080"
      SERVER_SECRET: ${SECRET}
      LOVE_ENDPOINT: http${SECURE:+s}://${HOST_ADDRESS}/_love
      ACCOUNTS_URL: http${SECURE:+s}://${HOST_ADDRESS}/_accounts
      ACCOUNTS_URL_INTERNAL: http://account:3000
      REKONI_URL: http${SECURE:+s}://${HOST_ADDRESS}/_rekoni
      CALENDAR_URL: http${SECURE:+s}://${HOST_ADDRESS}/_calendar
      GMAIL_URL: http${SECURE:+s}://${HOST_ADDRESS}/_gmail
      TELEGRAM_URL: http${SECURE:+s}://${HOST_ADDRESS}/_telegram
      STATS_URL: http${SECURE:+s}://${HOST_ADDRESS}/_stats
      UPLOAD_URL: /files
      ELASTIC_URL: http://elastic:9200
      COLLABORATOR_URL: ws${SECURE:+s}://${HOST_ADDRESS}/_collaborator
      STORAGE_CONFIG: minio|minio?accessKey=minioadmin&secretKey=minioadmin
      TITLE: ${TITLE:-Huly Self Host}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-en}
      LAST_NAME_FIRST: ${LAST_NAME_FIRST:-true}
      DESKTOP_UPDATES_CHANNEL: ${DESKTOP_CHANNEL}
    networks:
      - huly

  fulltext:
    image: hardcoreeng/fulltext:${HULY_VERSION}
    container_name: huly-fulltext
    restart: unless-stopped
    environment:
      SERVER_SECRET: ${SECRET}
      DB_URL: ${CR_DB_URL}
      FULLTEXT_DB_URL: http://elastic:9200
      ELASTIC_INDEX_NAME: huly_storage_index
      STORAGE_CONFIG: minio|minio?accessKey=minioadmin&secretKey=minioadmin
      REKONI_URL: http://rekoni:4004
      ACCOUNTS_URL: http://account:3000
      STATS_URL: http://stats:4900
      QUEUE_CONFIG: redpanda:9092
    networks:
      - huly

  stats:
    image: hardcoreeng/stats:${HULY_VERSION}
    container_name: huly-stats
    restart: unless-stopped
    environment:
      PORT: "4900"
      SERVER_SECRET: ${SECRET}
    networks:
      - huly

  kvs:
    image: hardcoreeng/hulykvs:${HULY_VERSION}
    container_name: huly-kvs
    restart: unless-stopped
    depends_on:
      cockroach:
        condition: service_started
    ports:
      - "8094:8094"
    environment:
      HULY_DB_CONNECTION: ${CR_DB_URL}
      HULY_TOKEN_SECRET: ${SECRET}
    networks:
      - huly

networks:
  huly:
    driver: bridge