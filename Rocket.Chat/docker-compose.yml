services:
  mongodb-fix-permissions:
    image: docker.io/mongodb/mongodb-community-server:${MONGODB_VERSION:-8.2}-ubi8
    container_name: rocketchat-mongodb-fix-permissions
    restart: on-failure
    user: "0"
    environment:
      MONGODB_USER_ID: ${MONGODB_USER_ID:-1001}
    volumes:
      - ./volumes/mongodb:/data/db
    entrypoint: >
      sh -xc '
        owner="$(stat -c %u /data/db 2>/dev/null || echo 0)";
        if [ "$$owner" != "$$MONGODB_USER_ID" ]; then
          echo "Fixing /data/db ownership to uid $$MONGODB_USER_ID";
          chown -R "$$MONGODB_USER_ID" /data/db;
        else
          echo "Ownership already correct";
        fi
      '

  mongodb:
    image: docker.io/mongodb/mongodb-community-server:${MONGODB_VERSION:-8.2}-ubi8
    container_name: rocketchat-mongodb
    restart: unless-stopped
    depends_on:
      mongodb-fix-permissions:
        condition: service_completed_successfully
    user: "${MONGODB_USER_ID:-1001}"
    environment:
      MONGODB_USER_ID: ${MONGODB_USER_ID:-1001}
      MONGODB_REPLICA_SET_NAME: ${MONGODB_REPLICA_SET_NAME:-rs0}
      MONGODB_PORT_NUMBER: ${MONGODB_PORT_NUMBER:-27017}
      MONGODB_ADVERTISED_HOSTNAME: ${MONGODB_ADVERTISED_HOSTNAME:-mongodb}
    entrypoint:
      - sh
      - -ec
      - |
        exec mongod --replSet "$$MONGODB_REPLICA_SET_NAME" --bind_ip_all
    volumes:
      - ./volumes/mongodb:/data/db
    healthcheck:
      test:
        - CMD
        - mongosh
        - "mongodb://localhost:27017/?directConnection=true"
        - --eval
        - "db.adminCommand('ping')"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - rocketchat

  mongodb-init-replica:
    image: docker.io/mongodb/mongodb-community-server:${MONGODB_VERSION:-8.2}-ubi8
    container_name: rocketchat-mongodb-init-replica
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_REPLICA_SET_NAME: ${MONGODB_REPLICA_SET_NAME:-rs0}
      MONGODB_PORT_NUMBER: ${MONGODB_PORT_NUMBER:-27017}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/?directConnection=true}
      MONGODB_ADVERTISED_HOSTNAME: ${MONGODB_ADVERTISED_HOSTNAME:-mongodb}
    entrypoint: >
      sh -xc '
        mongosh "$$MONGODB_URI" --eval "
          try {
            rs.status();
            print(\"Replica set already initialized\");
          } catch (e) {
            rs.initiate({
              _id: \"$$MONGODB_REPLICA_SET_NAME\",
              members: [{ _id: 0, host: \"$$MONGODB_ADVERTISED_HOSTNAME:$$MONGODB_PORT_NUMBER\" }]
            });
          }
        ";
      '
    networks:
      - rocketchat

  nats:
    image: docker.io/nats:${NATS_VERSION:-2.11-alpine}
    container_name: rocketchat-nats
    restart: unless-stopped
    command: --http_port 8222
    networks:
      - rocketchat

  rocketchat:
    image: ${ROCKETCHAT_IMAGE:-registry.rocket.chat/rocketchat/rocket.chat}:${RELEASE:-8.0.1}
    container_name: rocketchat
    restart: unless-stopped
    depends_on:
      mongodb-init-replica:
        condition: service_completed_successfully
      nats:
        condition: service_started
    ports:
      - "${BIND_IP:-0.0.0.0}:${HOST_PORT:-3000}:${PORT:-3000}"
    environment:
      ROOT_URL: ${ROOT_URL:-http://localhost:3000}
      PORT: ${PORT:-3000}
      DEPLOY_METHOD: docker
      DEPLOY_PLATFORM: compose
      REG_TOKEN: ${REG_TOKEN:-}
      OVERWRITE_SETTING_Prometheus_Enabled: "true"
      OVERWRITE_SETTING_Prometheus_Port: "${METRICS_PORT:-9458}"
      MONGO_URL: ${MONGO_URL:-mongodb://mongodb:27017/rocketchat?replicaSet=rs0}
      TRANSPORTER: ${NATS_URL:-monolith+nats://nats:4222}
      INSTANCE_IP: ${INSTANCE_IP:-}
    entrypoint: sh
    command:
      - -c
      - |
        echo "Waiting for MongoDB...";
        for i in $(seq 1 60); do
          if nc -z mongodb 27017 >/dev/null 2>&1; then
            exec node main.js;
          fi;
          sleep 5;
        done;
        exit 1
    volumes:
      - ./volumes/rocketchat/uploads:/app/uploads
    networks:
      - rocketchat

networks:
  rocketchat:
    driver: bridge